<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Chat Toxicity Detection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="title">Game Chat Toxicity Detector</h1>

    <div class="main-layout">

        <div id="lamp" class="lamp"></div>

        <div class="container">
            <input type="text" id="message" placeholder="Enter Chat message">
            <button onclick="analyze()">Analyze Message</button>

            <div id="result"></div>

            <h3 style="margin-top:20px;">Toxicity Level</h3>

            <div id="toxicity-bar-container">
                <div id="toxicity-bar"></div>
            </div>

            <p id="toxicity-text"></p>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
